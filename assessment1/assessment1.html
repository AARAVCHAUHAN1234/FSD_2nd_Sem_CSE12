<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assessment 1</title>
    <link rel="stylesheet" href="assessment1.css" />
  </head>
  <body>
    <div class="div22" style="width: 90%">
      <h2>Students Record</h2>
      <div
        style="
          display: flex;
          flex-direction: row;
          align-items: center;
          gap: 30px;
          justify-content: space-around;
        "
      >
        <div style="display: flex; flex-direction: column;">
          <label for="name">Name:</label>
          <input type="text" id="name" /><br /><br />
          <label for="id">roll number:</label>
          <input type="number" id="id" /><br /><br />
        </div>
        <div style="display: flex; flex-direction: column">
          <label for="english">english</label>
          <input type="number" id="english" /><br /><br />
          <label for="math">maths:</label>
          <input type="number" id="maths" /><br /><br />
          <label for="science">science:</label>
          <input type="number" id="science" /><br /><br />
        </div>
      </div>
      <div class="hero">
        <div>
          <button onclick="ADD()">ADD STUDENTS RECORD</button>
          <button onclick="DISPLAY()">ALL STUDENTS LIST</button>
          <button onclick="GREATER()">STUDENTS WITH 80+</button>
        </div>
        <div>
          <button onclick="TOTAL()">TOTAL STUDENTS</button>
          <button onclick="average()">STUDENTS AVERAGE MARKS</button>
          <button onclick="countFail()">
            FAILED STUDENTS
          </button>
          <button onclick="total()">
            STUDENTS TOTAL MARKS
          </button>
        </div>
      </div>
      <div id="output" ></div>
    </div>

    <script src="assessment1.js"></script>
  </body>
</html>
