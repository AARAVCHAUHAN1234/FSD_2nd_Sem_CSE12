<!doctype html> 
<html lang="en"> 
  <head> 
    <meta charset="UTF-8" /> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0" /> 
    <title>Experiment2</title> 
    <link rel="stylesheet" href="exp2.css" /> 
  </head> 
  <body> 
    <div class="div22" style="width: 90%"> 
      <h2>Employees Records</h2> 
      <div 
        style=" 
          display: flex; 
          flex-direction: row; 
          align-items: center; 
          gap: 30px; 
          justify-content: space-around; 
        " 
      > 
        <div style="display: flex; flex-direction: column;"> 
          <label for="name">Name:</label> 
          <input type="text" id="name" /><br /><br /> 
          <label for="id">Age:</label> 
          <input type="number" id="id" /><br /><br /> 
        </div> 
        <div style="display: flex; flex-direction: column"> 
          <label for="department">Department:</label> 
          <input type="text" id="department" /><br /><br /> 
          <label for="salary">Salary:</label> 
          <input type="number" id="salary" /><br /><br /> 
        </div> 
      </div> 
      <div class="hero"> 
        <div> 
          <button onclick="ADD()">ADD EMPLOYEE</button> 
          <button onclick="DISPLAY()">ALL EMPLOYEES LIST</button> 
          <button onclick="GREATER()">EMPLOYEES WITH SALARY > 50000</button> 
        </div> 
        <div> 
          <button onclick="sum()">EMPLOYYES TOTAL SALARY</button> 
          <button onclick="average()">EMPLOYEES AVERAGE SALARY</button> 
          <button onclick="countByDepartment()"> 
            COUNT EMPLOYEE BY DEPARTMENT 
          </button> 
        </div> 
      </div> 
      <div id="output" ></div> 
    </div> 
 
    <script src="exp2.js"></script> 
  </body> 
</html>
