<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TechStore</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
  body{
    background:#f2f2f2;
  }

  .navbar{
    padding:10px 0;
  }

  .navbar-brand{
    font-size:28px !important;
  }

  .nav-link{
    font-size:14px;
  }

  .card{
    border-radius:10px;
    overflow:hidden;
  }

  .card img{
    height:180px;
    object-fit:contain;
    padding:15px;
  }

  .card-title{
    font-size:24px;
  }

  .card-body p{
    font-size:14px;
  }

  .price{
    font-size:22px;
    font-weight:bold;
  }

  .btn{
    font-size:14px;
    padding:6px 14px;
  }

  .badge{
    font-size:12px;
  }

  footer{
    margin-top:60px;
    font-size:14px;
  }
</style>
</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fs-3" href="#">TechStore</a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#menu"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link active" href="#">Home</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#">Products</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#">About</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#">Contact</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="py-5">
    <div class="container">

      <div class="row g-4">

        <div class="col-lg-4 col-md-6">
          <div class="card h-100">

            <img
              src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=500"
              class="card-img-top"
              alt="Laptop"
            >

            <div class="card-body">

              <h2 class="card-title">Laptop</h2>

              <p class="text-muted">
                High performance laptop
              </p>

              <div class="d-flex align-items-center gap-2 mb-3">
                <span class="price">₹50,000</span>

                <span class="badge bg-success">
                  New
                </span>
              </div>

              <button class="btn btn-primary">
                View Details
              </button>

            </div>
          </div>
        </div>

        <div class="col-lg-4 col-md-6">
          <div class="card h-100">

            <img
              src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&h=250&fit=crop"
              class="card-img-top"
              alt="Mobile"
            >

            <div class="card-body">

              <h2 class="card-title">Mobile</h2>

              <p class="text-muted">
                Latest smartphone
              </p>

              <div class="d-flex align-items-center gap-2 mb-3">
                <span class="price">₹30,000</span>

                <span class="badge bg-danger">
                  Sale
                </span>
              </div>

              <button class="btn btn-primary">
                View Details
              </button>

            </div>
          </div>
        </div>

        <div class="col-lg-4 col-md-6">
          <div class="card h-100">

            <img
              src="https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400&h=250&fit=crop"
              class="card-img-top"
              alt="Headphones"
            >

            <div class="card-body">

              <h2 class="card-title">Headphones</h2>

              <p class="text-muted">
                Noise cancelling
              </p>

              <div class="d-flex align-items-center gap-2 mb-3">
                <span class="price">₹5,000</span>

                <span class="badge bg-success">
                  New
                </span>
              </div>

              <button class="btn btn-primary">
                View Details
              </button>

            </div>
          </div>
        </div>

      </div>
    </div>
  </section>

  <footer class="bg-dark text-white text-center py-3">
    <p class="mb-0">
      © 2026 TechStore | Follow us on social media
    </p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
