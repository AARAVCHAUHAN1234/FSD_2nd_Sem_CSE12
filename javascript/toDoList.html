<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do List</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      margin-top: 50px;
      background: #f4f4f4;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
    }

    input {
      width: 70%;
      padding: 8px;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
    }

    li {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #eee;
      padding: 8px;
      border-radius: 5px;
    }

    .delete {
      background: red;
      color: white;
      border: none;
      padding: 5px 8px;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>To-Do List</h2>

    <input type="text" id="taskInput" placeholder="Enter task">
    <button onclick="addTask()">Add</button>

    <ul id="taskList"></ul>
  </div>

  <script>
    function addTask() {
      const input = document.getElementById("taskInput");
      const task = input.value.trim();

      if (task === "") return;

      const li = document.createElement("li");
      li.innerHTML = `
        ${task}
        <button class="delete" onclick="deleteTask(this)">Delete</button>
      `;

      document.getElementById("taskList").appendChild(li);

      input.value = "";
    }

    function deleteTask(button) {
      button.parentElement.remove();
    }
  </script>

</body>
</html>
